name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate profile repo
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify dependency-map.yml is valid YAML
        run: python3 -c "import yaml; yaml.safe_load(open('dependency-map.yml'))"

      - name: Verify README is non-empty
        run: |
          set -euo pipefail
          test -s README.md
          echo "README.md OK ($(wc -l < README.md) lines)"

      - name: Setup Node.js (for markdownlint)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Run markdownlint on owned .md files
        run: npx --yes markdownlint-cli '**/*.md' --ignore-path .markdownlintignore

      - name: Link check with lychee
        uses: lycheeverse/lychee-action@82202e5e9c2f4ef1a55a3d02563e1cb6041e5332 # v2
        with:
          args: --no-progress --exclude-loopback --exclude-mail '**/*.md'
          fail: false
