# =============================================================================
# CI Template: Public Python Library (qwen3-embed)
# Source: https://github.com/n24q02m/.github/templates/ci/public-python-lib.yml
#
# Differences from public-python.yml:
#   - Multi-version Python matrix (3.10-3.14)
#   - Lint/type-check only on primary version (3.13)
#   - Tests run on ALL versions
#
# CUSTOMIZE: Search for "# CUSTOMIZE:" comments and adjust for your repo.
# =============================================================================
name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  issue_comment:
    types: [created, edited]
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================================
  # PR Title Check
  # ============================================================================
  pr-title-check:
    name: PR Title Check
    if: >-
      github.event_name == 'pull_request_target'
      && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Validate and auto-fix PR title
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json title -q .title)
          if [[ "$title" =~ ^(feat|fix)(\(.+\))?:.+ ]] || [[ "$title" =~ ^chore\(release\):.+ ]]; then
            echo "Title is valid: $title"
            exit 0
          fi
          clean=$(echo "$title" | sed -E 's/^[^a-zA-Z]*//; s/^(Bolt|Sentinel|Guard|Shield|Palette): *(\[.*\] *)?//')
          if echo "$clean" | grep -qiE 'fix|bug|vulnerability|security|patch|resolve|crash|error'; then
            new_title="fix: $(echo "$clean" | sed 's/^./\L&/')"
          else
            new_title="feat: $(echo "$clean" | sed 's/^./\L&/')"
          fi
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --title "$new_title"
          echo "Auto-fixed: $title -> $new_title"

  # ============================================================================
  # Lint & Test (Multi-version Python matrix)
  # ============================================================================
  lint-and-test:
    # CUSTOMIZE: Matrix versions based on requires-python
    name: Lint & Test (Python ${{ matrix.python-version }})
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"

      - run: uv sync --python ${{ matrix.python-version }} --group dev

      # Lint/type-check only on primary version
      - name: Run Ruff linter
        if: matrix.python-version == '3.13'
        run: uv run ruff check .

      - name: Run Ruff formatter
        if: matrix.python-version == '3.13'
        run: uv run ruff format --check .

      - name: Run type check
        if: matrix.python-version == '3.13'
        run: uv run ty check

      - name: Run tests with coverage
        # CUSTOMIZE: --cov target, -m markers
        run: uv run pytest -m "not integration" --tb=short --cov=YOUR_PACKAGE --cov-report=xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================================
  # Dependency Review
  # ============================================================================
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
          # CUSTOMIZE: Add allow-ghsas if needed
          # allow-ghsas: GHSA-xxxx-xxxx-xxxx

  # ============================================================================
  # Qodo AI Code Review
  # ============================================================================
  ai_pr_review:
    name: Qodo AI Code Review
    if: >-
      (
        github.event_name == 'issue_comment'
        && github.event.sender.type != 'Bot'
      ) || (
        github.event_name == 'pull_request_target'
        && github.event.sender.type != 'Bot'
        && github.event.pull_request.user.login != 'n24q02m'
      )
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Load custom instructions
        run: |
          if [ -f ".github/best_practices.md" ]; then
            INSTRUCTIONS=$(cat .github/best_practices.md)
            RANDOM_EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "CUSTOM_INSTRUCTIONS<<$RANDOM_EOF" >> "$GITHUB_ENV"
            echo "$INSTRUCTIONS" >> "$GITHUB_ENV"
            echo "$RANDOM_EOF" >> "$GITHUB_ENV"
          fi

      - uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_REVIEWER__EXTRA_INSTRUCTIONS: ${{ env.CUSTOM_INSTRUCTIONS }}
          PR_CODE_SUGGESTIONS__EXTRA_INSTRUCTIONS: ${{ env.CUSTOM_INSTRUCTIONS }}
          PR_DESCRIPTION__EXTRA_INSTRUCTIONS: ${{ env.CUSTOM_INSTRUCTIONS }}
          GITHUB_ACTION_CONFIG__AUTO_REVIEW: "true"
          GITHUB_ACTION_CONFIG__AUTO_DESCRIBE: "true"
          GITHUB_ACTION_CONFIG__AUTO_IMPROVE: "true"
          GITHUB_ACTION_CONFIG__HANDLE_PR_ACTIONS: '["opened", "reopened", "ready_for_review", "synchronize"]'

  # ============================================================================
  # Email Notification
  # ============================================================================
  email-notify:
    name: Email Notification
    if: >-
      (github.event_name == 'issues' || github.event_name == 'pull_request_target')
      && github.actor != 'n24q02m'
      && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Send email notification
        uses: dawidd6/action-send-mail@v15
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: >-
            [${{ github.event.repository.name }}]
            ${{ github.event_name == 'issues' && 'Issue' || 'PR' }}
            #${{ github.event.issue.number || github.event.pull_request.number }}:
            ${{ github.event.issue.title || github.event.pull_request.title }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: GitHub Notify <${{ secrets.SMTP_USERNAME }}>
          body: |
            ${{ github.event_name == 'issues' && 'New issue' || 'New pull request' }} in ${{ github.repository }}

            Title: ${{ github.event.issue.title || github.event.pull_request.title }}
            Author: ${{ github.actor }}
            URL: ${{ github.event.issue.html_url || github.event.pull_request.html_url }}
            Action: ${{ github.event.action }}

            ---
            ${{ github.event.issue.body || github.event.pull_request.body || 'No description provided.' }}
