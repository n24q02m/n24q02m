# =============================================================================
# CI Template: Private Monorepo (Aiora, KnowledgePrism, QuikShipping)
# Source: https://github.com/n24q02m/.github/templates/ci/private-monorepo.yml
#
# Runner strategy:
#   - Lint/Test/Build: self-hosted ARM64 on OCI VM2 (NO harden-runner)
#   - PR Title/Dep Review/Email: ubuntu-latest (with harden-runner)
#   - Semgrep: ubuntu-latest (container: semgrep/semgrep, NO harden-runner)
#   - Qodo AI Review: ubuntu-latest (no harden-runner)
#   - Codecov: os: linux-arm64 (required for self-hosted ARM64)
#
# CUSTOMIZE: Search for "# CUSTOMIZE:" comments and adjust for your repo.
# =============================================================================
name: CI

on:
  pull_request:
    branches: [main]
    # CUSTOMIZE: Add path filters for monorepo
    paths:
      - "apps/**"
      - ".github/workflows/ci.yml"
  pull_request_target:
    branches: [main]
    # CUSTOMIZE: Same path filters as pull_request
    paths:
      - "apps/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    # CUSTOMIZE: Same path filters
    paths:
      - "apps/**"
      - ".github/workflows/ci.yml"
  issue_comment:
    types: [created, edited]
  workflow_dispatch: {}
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================================
  # Common CI Jobs (GitHub-hosted, ubuntu-latest)
  # ============================================================================
  pr-title-check:
    name: PR Title Check
    if: >-
      github.event_name == 'pull_request'
      && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Validate and auto-fix PR title
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json title -q .title)
          if [[ "$title" =~ ^(feat|fix)(\(.+\))?:.+ ]] || [[ "$title" =~ ^chore\(release\):.+ ]]; then
            echo "Title is valid: $title"
            exit 0
          fi
          clean=$(echo "$title" | sed -E 's/^[^a-zA-Z]*//; s/^(Bolt|Sentinel|Guard|Shield|Palette): *(\[.*\] *)?//')
          if echo "$clean" | grep -qiE 'fix|bug|vulnerability|security|patch|resolve|crash|error'; then
            new_title="fix: $(echo "$clean" | sed 's/^./\L&/')"
          else
            new_title="feat: $(echo "$clean" | sed 's/^./\L&/')"
          fi
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --title "$new_title"
          echo "Auto-fixed: $title -> $new_title"

  # ============================================================================
  # Semgrep SAST (ubuntu-latest, container)
  # ============================================================================
  semgrep:
    name: Semgrep SAST Scan
    if: >-
      (github.event_name == 'pull_request' || github.event_name == 'push')
      && github.actor != 'dependabot[bot]'
      && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      # CUSTOMIZE: Add --exclude-rule flags if needed
      # Example: semgrep scan --config auto --error --verbose --exclude-rule trailofbits.go.string-to-int-signedness-cast.string-to-int-signedness-cast
      - run: semgrep scan --config auto --error --verbose

  # ============================================================================
  # Qodo AI Code Review (ubuntu-latest)
  # ============================================================================
  ai_pr_review:
    name: Qodo AI Code Review
    if: >-
      (
        github.event_name == 'issue_comment'
        && github.event.sender.type != 'Bot'
      ) || (
        github.event_name == 'pull_request'
        && github.event.sender.type != 'Bot'
        && github.event.pull_request.user.login != 'n24q02m'
      )
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Load custom instructions
        run: |
          if [ -f ".github/best_practices.md" ]; then
            INSTRUCTIONS=$(cat .github/best_practices.md)
            RANDOM_EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "CUSTOM_INSTRUCTIONS<<$RANDOM_EOF" >> "$GITHUB_ENV"
            echo "$INSTRUCTIONS" >> "$GITHUB_ENV"
            echo "$RANDOM_EOF" >> "$GITHUB_ENV"
          fi

      - name: PR Agent action step
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_REVIEWER__EXTRA_INSTRUCTIONS: ${{ env.CUSTOM_INSTRUCTIONS }}
          PR_CODE_SUGGESTIONS__EXTRA_INSTRUCTIONS: ${{ env.CUSTOM_INSTRUCTIONS }}
          PR_DESCRIPTION__EXTRA_INSTRUCTIONS: ${{ env.CUSTOM_INSTRUCTIONS }}
          GITHUB_ACTION_CONFIG__AUTO_REVIEW: "true"
          GITHUB_ACTION_CONFIG__AUTO_DESCRIBE: "true"
          GITHUB_ACTION_CONFIG__AUTO_IMPROVE: "true"

  # ============================================================================
  # Dependency Review (ubuntu-latest, harden-runner)
  # Private repos need continue-on-error at step level (GitHub Advanced Security required)
  # ============================================================================
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
          # CUSTOMIZE: Add allow-ghsas if needed
          # allow-ghsas: GHSA-xxxx-xxxx-xxxx
        continue-on-error: true

  # ============================================================================
  # Email Notification (ubuntu-latest, harden-runner)
  # ============================================================================
  email-notify:
    name: Email Notification
    if: >-
      (github.event_name == 'issues' || github.event_name == 'pull_request')
      && github.actor != 'n24q02m'
      && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: >-
            [${{ github.event.repository.name }}]
            ${{ github.event_name == 'issues' && 'Issue' || 'PR' }}
            #${{ github.event.issue.number || github.event.pull_request.number }}:
            ${{ github.event.issue.title || github.event.pull_request.title }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: GitHub Notify <${{ secrets.SMTP_USERNAME }}>
          body: |
            ${{ github.event_name == 'issues' && 'New issue' || 'New pull request' }} in ${{ github.repository }}

            Title: ${{ github.event.issue.title || github.event.pull_request.title }}
            Author: ${{ github.actor }}
            URL: ${{ github.event.issue.html_url || github.event.pull_request.html_url }}
            Action: ${{ github.event.action }}

            ---
            ${{ github.event.issue.body || github.event.pull_request.body || 'No description provided.' }}

  # ============================================================================
  # CUSTOMIZE: Backend jobs below (self-hosted ARM64, NO harden-runner)
  # Example: Go API
  # ============================================================================
  lint-api:
    name: Backend - Lint & Test
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: [self-hosted, linux, arm64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # CUSTOMIZE: Language-specific setup (Go/Python/etc.)
      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest

      - name: Gofumpt check
        working-directory: apps/api
        run: |
          fmt_out=$(gofumpt -l cmd internal)
          if [ -n "$fmt_out" ]; then
            echo "Go files need formatting:"
            echo "$fmt_out"
            exit 1
          fi

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: apps/api

      - name: Go test with coverage
        working-directory: apps/api
        # CUSTOMIZE: Test packages
        run: go test ./internal/... -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          files: apps/api/coverage.out
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
          # IMPORTANT: Required for self-hosted ARM64 runners
          os: linux-arm64

  build-api:
    name: Backend - Build
    runs-on: [self-hosted, linux, arm64]
    needs: lint-api
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build application
        working-directory: apps/api
        run: go build ./cmd/server

  # ============================================================================
  # CUSTOMIZE: AI Worker example (Python on self-hosted ARM64)
  # ============================================================================
  ai-worker:
    name: AI Worker - Lint & Test
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: [self-hosted, linux, arm64]
    defaults:
      run:
        working-directory: apps/ai-worker
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=app --cov-report=xml
      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ai-worker
          files: apps/ai-worker/coverage.xml
          os: linux-arm64

  # ============================================================================
  # CUSTOMIZE: Frontend example (Next.js/Bun on self-hosted ARM64)
  # ============================================================================
  lint-web:
    name: Frontend - Lint & Type Check
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: [self-hosted, linux, arm64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: apps/web
        run: bun install --frozen-lockfile
      - name: Run ESLint
        working-directory: apps/web
        run: bun run lint
      - name: Run TypeScript type check
        working-directory: apps/web
        run: bunx tsc --noEmit

  build-web:
    name: Frontend - Build
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: [self-hosted, linux, arm64]
    needs: lint-web
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: apps/web
        run: bun install --frozen-lockfile
      - name: Build
        working-directory: apps/web
        env:
          # CUSTOMIZE: Build-time env vars
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: bun run build
