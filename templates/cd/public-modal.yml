# =============================================================================
# CD Template: Modal.com Deploy (modalcom-ai-workers)
# Source: https://github.com/n24q02m/.github/templates/cd/public-modal.yml
#
# Pipeline: PSR v10 -> Modal.com deploy (no Docker, no PyPI)
# CUSTOMIZE: Search for "# CUSTOMIZE:" comments and adjust for your repo.
# =============================================================================
name: CD

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - beta
          - stable
      force_deploy:
        description: "Force deploy all workers (skip release)"
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Release: PSR v10
  # ============================================================================
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - uses: python-semantic-release/python-semantic-release@v10
        id: release
        with:
          github_token: ${{ secrets.GH_PAT }}
          prerelease: ${{ inputs.release_type == 'beta' }}
          prerelease_token: beta

      - uses: python-semantic-release/publish-action@v10
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GH_PAT }}
          tag: ${{ steps.release.outputs.tag }}

  # ============================================================================
  # Deploy Workers to Modal.com
  # ============================================================================
  deploy-workers:
    name: Deploy Workers to Modal.com
    runs-on: ubuntu-latest
    needs: release
    if: |
      always() && !cancelled() &&
      (needs.release.outputs.released == 'true' || inputs.force_deploy)
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        # CUSTOMIZE: Extra groups for Modal CLI
        run: uv sync --group dev --extra deploy

      - name: Pre-download models to Volume
        run: uv run modal run src/ai_workers/common/volumes.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

      - name: Deploy active workers
        run: |
          # CUSTOMIZE: Worker deploy commands
          uv run python -m ai_workers deploy qwen3-reranker-8b
          uv run python -m ai_workers deploy qwen3-vl-reranker-8b
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

      - name: Summary
        run: |
          echo "## Workers Deployed to Modal.com" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ needs.release.outputs.version || 'force-deploy' }}\`" >> $GITHUB_STEP_SUMMARY
          # CUSTOMIZE: Worker list
          echo "- Workers: qwen3-reranker-8b, qwen3-vl-reranker-8b" >> $GITHUB_STEP_SUMMARY
