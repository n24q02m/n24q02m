# =============================================================================
# CI Template: Modal.com Deploy (modalcom-ai-workers)
# Source: https://github.com/n24q02m/.github/templates/ci/public-modal.yml
#
# Runner strategy: ubuntu-latest for ALL jobs, harden-runner everywhere.
# Same as public-python.yml but Python 3.13 pinned (no matrix).
# CUSTOMIZE: Search for "# CUSTOMIZE:" comments and adjust for your repo.
# =============================================================================
name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================================
  # Lint & Test
  # ============================================================================
  lint-and-test:
    name: Lint & Test
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check

      - name: Run tests with coverage
        # CUSTOMIZE: --cov target
        run: uv run pytest --tb=short --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================================
  # Dependency Review
  # ============================================================================
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always

  # ============================================================================
  email-notify:
    name: Email Notification
    if: >-
      (github.event_name == 'issues' || github.event_name == 'pull_request_target')
      && github.actor != 'n24q02m'
      && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Send email notification
        uses: dawidd6/action-send-mail@v15
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: >-
            [${{ github.event.repository.name }}]
            ${{ github.event_name == 'issues' && 'Issue' || 'PR' }}
            #${{ github.event.issue.number || github.event.pull_request.number }}:
            ${{ github.event.issue.title || github.event.pull_request.title }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: GitHub Notify <${{ secrets.SMTP_USERNAME }}>
          body: |
            ${{ github.event_name == 'issues' && 'New issue' || 'New pull request' }} in ${{ github.repository }}

            Title: ${{ github.event.issue.title || github.event.pull_request.title }}
            Author: ${{ github.actor }}
            URL: ${{ github.event.issue.html_url || github.event.pull_request.html_url }}
            Action: ${{ github.event.action }}

            ---
            ${{ github.event.issue.body || github.event.pull_request.body || 'No description provided.' }}
